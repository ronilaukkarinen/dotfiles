[main]
font=Liga SFMono Nerd Font:style=Regular:size=11
font-bold=Liga SFMono Nerd Font:style=SemiBold:size=11
font-italic=Liga SFMono Nerd Font:style=Italic:size=11
font-bold-italic=Liga SFMono Nerd Font:style=SemiBold Italic:size=11
letter-spacing=-0.45
dpi-aware=yes
pad=40x60
initial-window-size-chars=78x26

[colors-dark]
# Dracula theme
foreground=f8f8f2
background=282a36
alpha=0.3

## Normal/regular colors (color palette 0-7)
regular0=21222c  # black
regular1=ff5555  # red
regular2=50fa7b  # green
regular3=f1fa8c  # yellow
regular4=bd93f9  # blue
regular5=ff79c6  # magenta
regular6=8be9fd  # cyan
regular7=f8f8f2  # white

## Bright colors (color palette 8-15)
bright0=6272a4   # bright black
bright1=ff6e6e   # bright red
bright2=69ff94   # bright green
bright3=ffffa5   # bright yellow
bright4=d6acff   # bright blue
bright5=ff92df   # bright magenta
bright6=a4ffff   # bright cyan
bright7=ffffff   # bright white

## Selection colors
selection-foreground=f8f8f2
selection-background=44475a

## Cursor colors
cursor=282a36 f8f8f2

[csd]
preferred=server
size=26
color=282a36
button-width=26
button-minimize-color=f1fa8c
button-maximize-color=50fa7b
button-close-color=ff5555
border-width=0
border-color=282a36

[scrollback]
lines=10000

[url]
launch=xdg-open ${url}
